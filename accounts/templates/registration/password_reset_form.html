{% extends 'base.html' %}

{% block title %}Reset Password — MSA Library{% endblock %}
{% block main_title %}Reset Password{% endblock %}

{% block content %}
<div class="form-card">
  <div class="form-card-title">Forgot your password?</div>
  <div class="form-card-subtitle">Enter your email and we'll send reset instructions.</div>

  <form method="post">
    {% csrf_token %}
    <div class="django-form">{{ form.as_p }}</div>
    <button type="submit" class="btn-primary btn-full">Send Reset Link</button>
  </form>
</div>
{% endblock %}
