{% extends 'base.html' %}

{% block title %}Sign Up — MSA Library{% endblock %}
{% block main_title %}Create Account{% endblock %}

{% block content %}
<div class="form-card">
  <div class="form-card-title">Sign Up</div>
  <div class="form-card-subtitle">
    Already have an account? <a href="{% url 'login' %}" style="color:var(--red);font-weight:600;">Log In</a>
  </div>

  <p style="font-size:13px;color:var(--text-3);margin-bottom:20px;background:var(--bg);padding:10px 14px;border-radius:var(--radius-sm);">
    * Password is optional and can be left blank
  </p>

  <form method="post">
    {% csrf_token %}
    <div class="django-form">{{ form.as_p }}</div>
    <button type="submit" class="btn-primary btn-full">Create Account</button>
  </form>
</div>
{% endblock %}
