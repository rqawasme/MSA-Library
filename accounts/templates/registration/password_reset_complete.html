{% extends 'base.html' %}

{% block title %}Password Reset Complete — MSA Library{% endblock %}
{% block main_title %}Password Updated{% endblock %}

{% block content %}
<div class="form-card" style="text-align:center;">
  <div style="font-size:48px;margin-bottom:16px;">✅</div>
  <div class="form-card-title">Password reset complete</div>
  <p style="color:var(--text-2);font-size:14px;margin-top:12px;margin-bottom:24px;">
    Your new password has been set successfully.
  </p>
  <a href="{% url 'login' %}" class="btn-primary">Log In</a>
</div>
{% endblock %}
